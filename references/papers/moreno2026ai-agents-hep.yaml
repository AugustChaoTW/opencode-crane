abstract: Large language model-based AI agents are now able to autonomously execute
  substantial portions of a high energy physics (HEP) analysis pipeline with minimal
  expert-curated input. Given access to a HEP dataset, an execution framework, and
  a corpus of prior experimental literature, we find that Claude Code succeeds in
  automating all stages of a typical analysis.
