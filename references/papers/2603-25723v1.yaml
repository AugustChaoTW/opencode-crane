abstract: Agent performance increasingly depends on \emph{harness engineering}, yet
  harness design is usually buried in controller code and runtime-specific conventions,
  making it hard to transfer, compare, and study as a scientific object. We ask whether
  the high-level control logic of an agent harness can instead be externalized as
  a portable executable artifact. We introduce \textbf{Natural-Language Agent Harnesses}
  (NLAHs), which express harness behavior in editable natural language, and \textbf{Intelligent
  Harness Runtime} (IHR), a shared runtime that executes these harnesses through explicit
  contracts, durable artifacts, and lightweight adapters. Across coding and computer-use
  benchmarks, we conduct controlled evaluations of operational viability, module ablation,
  and code-to-text harness migration.
