abstract: We present a bottom-up holographic description of the QCD $θ$-vacuum and
  the $U(1)_A$ anomaly in five dimensions. The multi-branched $θ$-vacuum structure
  emerges geometrically from a higher-dimensional gauge field, while the axial anomaly
  is realized through a Stückelberg coupling that is dual to a Chern-Simons term.
  In this framework, the $η'$ meson appears as a zero mode of bulk fluctuations, and
  its mass arises from the anomaly-induced Stückelberg term. The construction provides
  a transparent holographic derivation of the anomaly contribution to the $η'$ mass
  and naturally reproduces the Witten-Veneziano relation between the $η'$ mass and
  the Yang-Mills topological susceptibility.
