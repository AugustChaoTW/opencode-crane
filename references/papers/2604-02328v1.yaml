pdf_path: ''
abstract: We present ModMap, a natively multiview and multimodal framework for 3D
  anomaly detection and segmentation. Unlike existing methods that process views independently,
  our method draws inspiration from the crossmodal feature mapping paradigm to learn
  to map features across both modalities and views, while explicitly modelling view-dependent
  relationships through feature-wise modulation. We introduce a cross-view training
  strategy that leverages all possible view combinations, enabling effective anomaly
  scoring through multiview ensembling and aggregation. To process high-resolution
  3D data, we train and publicly release a foundational depth encoder tailored to
  industrial datasets. Experiments on SiM3D, a recent benchmark that introduces the
  first multiview and multimodal setup for 3D anomaly detection and segmentation,
  demonstrate that ModMap attains state-of-the-art performance by surpassing previous
  methods by wide margins.
