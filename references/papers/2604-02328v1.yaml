key: 2604-02328v1
title: 'Modulate-and-Map: Crossmodal Feature Mapping with Cross-View Modulation for
  3D Anomaly Detection'
authors:
- Alex Costanzino
- Pierluigi Zama Ramirez
- Giuseppe Lisanti
- Luigi Di Stefano
