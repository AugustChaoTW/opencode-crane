abstract: 'Recent advances in image generation models have expanded their applications
  beyond aesthetic imagery toward practical visual content creation. However, existing
  benchmarks mainly focus on natural image synthesis and fail to systematically evaluate
  models under the structured and multi-constraint requirements of real-world commercial
  design tasks. In this work, we introduce BizGenEval, a systematic benchmark for
  commercial visual content generation. The benchmark spans five representative document
  types: slides, charts, webpages, posters, and scientific figures, and evaluates
  four key capability dimensions: text rendering, layout control, attribute binding,
  and knowledge-based reasoning, forming 20 diverse evaluation tasks. BizGenEval contains
  400 carefully curated prompts and 8000 human-verified checklist questions to rigorously
  assess whether generated images satisfy complex visual and semantic constraints.
  We conduct large-scale benchmarking on 26 popular image generation systems, including
  state-of-the-art commercial APIs and leading open-source models. The results reveal
  substantial capability gaps between current generative models and the requirements
  of professional visual content creation. We hope BizGenEval serves as a standardized
  benchmark for real-world commercial visual content generation.'
