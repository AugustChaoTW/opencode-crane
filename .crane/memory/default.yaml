- timestamp: '2026-04-05T02:49:26'
  content: "**Phase 1.1 完成：時序因果圖學習 POC 實施**\n\n✅ **Issue #10 完成 (2025-04-05)**\n\n\
    **實施內容：**\n- 檔案: `/experiments/causal_discovery.py` (407 行)\n- SimplePC 類：PC Algorithm\
    \ 實施 (無外部依賴)\n  - 條件獨立性測試 (基於偏相關)\n  - 圖邊定向 (基於變異數和相關強度)\n  - 因果鏈提取\n- CausalDiscoveryPOC：評估框架\n\
    \  - 圖複雜度、連接性、拓撲指標\n  - NetworkX 視覺化 (PNG/PDF)\n  - 因果鏈 JSON 輸出\n\n**技術選擇：**\n\
    - 使用簡化的 PC Algorithm（無需 causalml/tigramite）\n- 依賴: numpy, pandas, scipy, sklearn,\
    \ networkx（已有）\n- 偏相關計算: LinearRegression 殘差法\n\n**預期指標：**\n- 因果圖邊數：~5-10 (簡化假設)\n\
    - 密度：~5-10% (稀疏圖)\n- 可解釋性提升：85%+ (因果鏈輔助)\n\n**待完成：**\n1. Issue #11 (主動學習模組整合)\
    \ - 預計 3-5 天\n2. Issue #12 (對比實驗: 因果 vs 基線) - 預計 3-5 天\n   - 在 100 個測試樣本上驗證\n\
    \   - 評估指標: F1, 可解釋性, 推理時間\n3. Phase 2 #13 (神經符號規則合成)\n4. Phase 3 #14 (論文改寫)\n\
    5. Phase 4 #15 (最終投稿)\n\n**長期計畫進度：**\n- Phase 1 (1-2 週): 因果發現 POC ✅ 開始\n- Phase\
    \ 2 (3-4 週): 規則合成\n- Phase 3 (5-6 週): 論文改寫\n- Phase 4 (7-8 週): 期刊投稿 (ESWA Q1)"
